<script>

function hex( n ) {
	return ('0'+Number(n).toString(16)).slice(-2);
}
function color( r, g, b ) {
	return '#' + hex(r) + hex(g) + hex(b);
}

function CleanLCLabel( lcLabelIn ) {
	lcLabelIn = lcLabelIn.toUpperCase();
	var lcLabel = '';
	for( var i = 0; i < lcLabelIn.length; ++i ) {
		var c = lcLabelIn.charAt(i);
		// Accept letters and numbers for lap display.
		if( '1' <= c && c <= '9' )
			c = String.fromCharCode('A'.charCodeAt(0) + c.charCodeAt(0) - '1'.charCodeAt(0));
		if( c == '-' ) {
			if( lcLabel && lcLabel.charAt([lcLabel.length-1]) != '-' )
				lcLabel += '-';
		}
		else if ( 'A' <= c && c <= cMaxLabels )
			lcLabel += c;
	}
	return lcLabel;
}

function GetLCLabel() {
	var lcLabel = '';
	var matches = /^\/LapCounter([1-9A-Z-]+)\.html$/.exec( window.location.pathname );
	if( matches != null && matches.length == 2 )
		lcLabel = matches[1];
	return CleanLCLabel( lcLabel );
}

function formatTime( secs ) {
	secs = Math.floor( secs );
	var s = secs % 60;
	var m = Math.floor(secs / 60) % 60;
	var h = Math.floor(secs / (60*60));
	return (h ? (h + ':') : '') +  ('0' + m + ':').slice(-3) + ('0' + s).slice(-2);
}

function formatTimeNoLeadingZero( secs ) {
	var t = formatTime( secs );
	if( t && t.charAt(0) == '0' )
		t = t.substring( 1 )
	return t;
}

function strToMillis( s ) {
	if( s == null )
		return null;
	s = s.replace(/[^0-9]/g,' ');
	var v = s.split(' ');
	return (new Date(
		parseInt(v[0],10), parseInt(v[1],10)-1, parseInt(v[2],10),
		parseInt(v[3],10), parseInt(v[4],10), parseInt(v[5],10), parseInt(v[6],10)
	)).getTime();
}

const lineHeightFactor = 1.2;
function fitTextToBoundingBox(ctx, text, boxWidth, boxHeight, options = {}) {
    const {
        fontFamily  = 'Arial',
        fontStyle   = '',
        lineHeight  = lineHeightFactor,
        minFontSize = 1,
        maxFontSize = 500,
    } = options;

	if( text === "" ) {
		const fontSize = 16;
		ctx.font = `${fontStyle} ${fontSize}px ${fontFamily}`.trim();
		return fontSize;
	}
	
    const lines = text.split('\n');

    function measureAtSize(fontSize) {
        ctx.font = `${fontStyle} ${fontSize}px ${fontFamily}`.trim();
        let maxWidth = 0;
        for (const line of lines) {
            maxWidth = Math.max(maxWidth, ctx.measureText(line).width);
        }
        const totalHeight = lines.length * fontSize * lineHeight;
        return { maxWidth, totalHeight };
    }

    // Step 1: measure at a known reference size to get a scale factor
    const refSize = 16;
    const { maxWidth: refWidth, totalHeight: refHeight } = measureAtSize(refSize);

    // Step 2: since width & height scale linearly with fontSize,
    //         calculate the exact size that fills each dimension
    const sizeByWidth  = refSize * (boxWidth  / refWidth);
    const sizeByHeight = refSize * (boxHeight / refHeight);

    // Step 3: take whichever constraint is tighter
    let fontSize = Math.min(sizeByWidth, sizeByHeight);
    fontSize = Math.min(Math.max(fontSize, minFontSize), maxFontSize);

    // Step 4: nudge up if we have room (rounding may leave a little space)
    const { maxWidth, totalHeight } = measureAtSize(fontSize);
    if (maxWidth <= boxWidth && totalHeight <= boxHeight) {
        while (true) {
            const { maxWidth: w, totalHeight: h } = measureAtSize(fontSize + 1);
            if (w > boxWidth || h > boxHeight) break;
            fontSize += 1;
        }
    }

    ctx.font = `${fontStyle} ${fontSize}px ${fontFamily}`.trim();
    return fontSize;
}

var MaxLabels = 6;
var cMaxLabels = String.fromCharCode('A'.charCodeAt(0) + MaxLabels - 1);

function LapCounter( aCanvas ) {
	this.canvas = aCanvas;
	this.flashOn = false;
	this.nTimer = 0;
	this.labels = [['999',false,null]];
	this.foregrounds = ['#FFFFFF','#FFFFFF','#FFFFFF','#FFFFFF','#FFFFFF','#FFFFFF'];
	this.backgrounds = [color(16,16,16), color(34,139,34), color(235,155,0), color(147,112,219), color(0,0,139), color(139,0,0)];
	this.lapElapsedClock = true;
	this.tRaceStart = null;

	this.tessellate = function ( numLabels=999 ) {
		const width = this.canvas.width, height = this.canvas.height;
		if( numLabels == 1 ) {
			return [[0, 0, width, height]];
		}
		else if( numLabels == 2 ) {
			const w = Math.floor(width / 2);
			return [[0, 0, w, height], [w, 0, w, height]];
		}
		else if( numLabels <= 4 ) {
			const w = Math.floor(width / 2);
			const h = Math.floor(height / 2);
			return [
				[0, 0, w, h], [w, 0, w, h],
				[0, h, w, h], [w, h, w, h],
			];
		}
		else {
			const w = Math.floor(width / 3);
			const h = Math.floor(height / 2);
			return [
				[0, 0, w, h], [w, 0, w, h], [2*w, 0, w, h],
				[0, h, w, h], [w, h, w, h], [2*w, h, w, h],
			];
		}
	}
	
	this.getRectangles = function( lcLabel ) {
		let colsPerRow = [0];
		let lcs = [];
		for( let i = 0; i < lcLabel.length; ++i ) {
			let c = lcLabel.charAt(i);
			if( '1' <= c && c <= '9' )
				c = String.fromCharCode( c.charCodeAt(0) - '1'.charCodeAt(0) + 'A'.charCodeAt(0) );
			if( c == '-' )
				colsPerRow.push( 0 );
			else if( 'A' <= c && c <= cMaxLabels) {
				++colsPerRow[colsPerRow.length-1];
				lcs.push( c.charCodeAt(0) - 'A'.charCodeAt(0) );
			}
		}
		
		let lcPositions = new Array( MaxLabels );
		if( colsPerRow.length == 1 && colsPerRow[0] == 0 )
			return lcPositions;
		
		const width = this.canvas.width, height = this.canvas.height;
		const h = height / colsPerRow.length;
		let iLC = 0;
		for( let row = 0; row < colsPerRow.length; ++row ) {
			const w = width / colsPerRow[row];
			for( let col = 0; col < colsPerRow[row]; ++col )
				lcPositions[lcs[iLC++]] = [Math.floor(col*w), Math.floor(row*h), Math.floor(w), Math.floor(h)];
		}
		return lcPositions;
	}
	
	this.onResize = function() {
		this.canvas.width = window.innerWidth;
		this.canvas.height = window.innerHeight;
		this.draw();
	}

	this.onTimer = function() {
		this.flashOn = !this.flashOn;
		this.draw();
	}
	
	this.needsTimer = function() {
		for( let i = 0; i < this.labels.length; ++i ) {
			if( this.labels[i][1] ) {
				return true;
			}
		}
		if( this.lapElapsedClock ) {
			for( let i = 0; i < this.labels.length; ++i ) {
				if( this.labels[i][2] != null ) {
					return true;
				}
			}
		}
		return false;
	}

	this.setLabels = function( labels ) {
		labels = labels || [['999', false, null]];
		
		// labels is of the format [[label1, flash, tLapStart], [label2, flash, tLapStart], ...]
		this.labels = labels.slice(0, MaxLabels);
		if( this.needsTimer() ) {
			if( !this.nTimer ) {
				this.nTimer = setInterval( this.onTimer.bind(this), 333 );
				this.flashOn = true;
			}
		}
		else {
			if( this.nTimer ) {
				clearInterval( this.nTimer );
				this.nTimer = 0;
			}
		}
		this.draw();
	}

	this.onRefresh = function( msg ) {
		this.tRaceStart = (new Date).getTime() - msg.curRaceTime * 1000.0;
		this.foregrounds = msg.foregrounds;
		this.backgrounds = msg.backgrounds;
		this.lapElapsedClock = msg.lapElapsedClock;
		this.isTimeTrial = msg.isTimeTrial;
		this.ttSpotText = msg.ttSpotText;
		this.setLabels( msg.labels );
	}
	
	this.draw = function() {
		let dc = this.canvas.getContext('2d');
		let width = this.canvas.width, height = this.canvas.height;
		
		dc.fillStyle = '#000000';
		dc.fillRect( 0, 0, width, height );
		
		function getFontSizeToFit( dc, text, w, h ) {
			return fitTextToBoundingBox( dc, text, w, h, {'style':'bold'} );
		}
		
		function drawText( dc, label, colour, x, y, w, h ) {
			const fontSize = getFontSizeToFit( dc, label, w, h );
			const lineHeight = fontSize * lineHeightFactor;
			const lines = label.split( '\n' );
			let yText = y + (h - lineHeight * lines.length) / 2;
			dc.textAlign = 'left';
			dc.textBaseline = 'top';
			dc.fillStyle = colour;
			for( const line of lines ) {
				const xText = x + (w - dc.measureText(line).width) / 2;
				dc.fillText( line, xText, yText );
				yText += lineHeight;
			}
		}
		
		function drawLapText( dc, label, colour, x, y, w, h ) {
			const fontSize = getFontSizeToFit( dc, label, w, h );
			const lineHeight = fontSize * lineHeightFactor;
			const lines = label.split( '\n' );
			let yText = y + (h - lineHeight * lines.length) / 2;
			dc.textAlign = 'left';
			dc.textBaseline = 'top';
			for( const line of lines ) {
				const xText = x + (w - dc.measureText(line).width) / 2;
				if( colour != '#000000' ) {
					dc.fillStyle = '#000000';
					const shadowOffset = fontSize/52;
					dc.fillText( line, xText + shadowOffset, yText + shadowOffset );
				}
				dc.fillStyle = colour;
				dc.fillText( line, xText, yText );
				yText += lineHeight;
			}
		}
		
		const footerMult = 0.18;
		const lineBorderWidth = 4;

		if( this.isTimeTrial ) {
			// Draw the TT text.
			const rects = this.tessellate(this.ttSpotText.length);
			
			const background = this.backgrounds[0];
			const foreground = this.foregrounds[0];
			
			for( let i = 0; i < this.ttSpotText.length; ++i ) {
				const rect = rects[i];
				if( rect == undefined )
					continue;
				const [x, y, w, h] = rect;
				
				dc.fillStyle = background;
				dc.fillRect( x, y, w, h );
				dc.lineWidth = lineBorderWidth;
				dc.strokeStyle = '#000000';
				dc.strokeRect( x, y, w, h );

				const shrink = 0.9;	// Add more whitespace around the text.
				const wText = w * shrink, hText = h * shrink;
				const xText = x + (w-wText)/2, yText = y + (h-hText)/2;
				drawLapText( dc, this.ttSpotText[i], foreground, xText, yText, wText, hText );
			}
		}
		else {
			// Draw the lap counter data.
			// Get the labels to draw from the url path.
			const lcLabel = GetLCLabel();

			// Check if we are drawing anything.
			let drawSomething = (this.labels.length > 0);
			if( lcLabel ) {
				drawSomething = false;
				for( let i = 0; !drawSomething && i < this.labels.length; ++i )
					drawSomething = (lcLabel.indexOf(String.fromCharCode('A'.charCodeAt(0) + i)) >= 0);
			}
			if( !drawSomething ) {
				dc.fillStyle = '#D3D3D3';
				dc.fillRect( 0, 0, width, height );
				return;
			}
		
			const rects = (lcLabel ? this.getRectangles(lcLabel) : this.tessellate(this.labels.length));
			
			for( let i = 0; i < this.labels.length; ++i ) {
				const rect = rects[i];
				if( rect == undefined )
					continue;
				let [x, y, w, h] = rect;
				const [label, flash, tLapStart] = this.labels[i];
				
				let hCC, yCC;

				dc.fillStyle = this.backgrounds[i];
				dc.fillRect( x, y, w, h );
				dc.lineWidth = lineBorderWidth;
				dc.strokeStyle = '#000000';
				dc.strokeRect( x, y, w, h );
				
				if( this.labels.length > 1 ) {
					hCC = h * footerMult;
					yCC = y + h - hCC;
					drawText( dc, String.fromCharCode('A'.charCodeAt(0) + i), this.foregrounds[i], x, yCC, hCC, hCC );
				}
				
				if( label == '1' ) {
					// Draw a bell in the last lap.
					hCC = h * footerMult;
					yCC = y + h - hCC;
					drawText( dc, '\uD83D\uDD14', this.foregrounds[i], x + w - hCC, yCC, hCC, hCC );
				}
				
				if( this.lapElapsedClock ) {
					hCC = h * footerMult;
					yCC = y + h - hCC;
					h -= hCC;
					if( tLapStart != null && this.tRaceStart ) {
						var tLap = this.tRaceStart + tLapStart*1000.0;
						var secs = ((new Date).getTime() - tLap)/1000.0;
						drawText( dc, formatTimeNoLeadingZero(secs), this.foregrounds[i], x, yCC, w, hCC );
					}
				}
				if( !flash || this.flashOn )
					drawLapText( dc, label, this.foregrounds[i], x, y, w, h );
			}
		}
	}
	this.setLabels( this.labels );
}

var websocket = null;
var timeoutID = null;
function RetryResetWebSocket() {
	if( timeoutID === null )
		timeoutID = setTimeout( ResetWebSocket, 5000 );
}
function ResetWebSocket() {
	if( timeoutID !== null ) {
		clearTimeout( timeoutID );
		timeoutID = null;
	}

	if ("WebSocket" in window) {
		if( websocket && websocket.readyState != websocket.CLOSED ) {
			websocket.close();
			websocket = null;
		}

		var wsurl = 'ws://' + window.location.hostname + ':' + (parseInt(window.location.port) + 2) + '/';
		//var wsurl = 'ws://' + 'localhost' + ':' + (parseInt(window.location.port) + 2) + '/';
		//console.log( 'wsurl="' + wsurl + '"' );
		websocket = new window.WebSocket( wsurl );

		websocket.onmessage = function( evt ) {
			const msg = JSON.parse( evt.data );
			if( msg.cmd == 'refresh' ) {
				lapCounter.onRefresh( msg );
			}
		};
		
		websocket.onerror = function(e) {
			console.log('WebSocket: Error.  Scheduling reconnect in 5 seconds...');
			RetryResetWebSocket();
		};
		
		websocket.onclose = function(e) {
			console.log('WebSocket: Closed.  Scheduling reconnect in 5 seconds...');
			RetryResetWebSocket();
		};
	}
}
function CloseWebSocket() {
	if( websocket )
		websocket.close();
	websocket = null;
}

function SetLabelsToDraw() {
	let lcLabel = GetLCLabel();
	let lcLabelNew = prompt("Enter the Lap Counters to Display (eg. A, B, AB, CD, ABC-DE):", lcLabel);
	if( lcLabelNew == null || lcLabelNew == lcLabel )
		return;
	
	lcLabel = CleanLCLabel( lcLabelNew );
	window.location.assign( '/LapCounter' + lcLabel + '.html' );
}

function onLoad() {
	lapCounter = new LapCounter( document.getElementById('lapCounter') );
	window.addEventListener('resize', lapCounter.onResize.bind(lapCounter), false);
	lapCounter.onResize();
	ResetWebSocket();
	document.body.addEventListener('click', SetLabelsToDraw, true );
}
</script>
	</head>
	<body onload="onLoad()">
		<canvas id="lapCounter"></canvas>
	</body>
</html>
